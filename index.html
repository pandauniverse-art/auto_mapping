<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미디어 파사드 현장 목업 자동 합성기</title>
    <style>
        body {
            background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .container { display: flex; gap: 20px; max-width: 1400px; width: 100%; margin-top: 20px; }
        .control-panel { flex: 1; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .view-panel { flex: 2.5; background: #020617; padding: 20px; border-radius: 12px; position: relative; display: flex; justify-content: center; align-items: center; }
        input[type="file"], input[type="range"], select { width: 100%; padding: 10px; margin: 8px 0 20px 0; background: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; }
        label { font-weight: bold; color: #94a3b8; font-size: 14px; }
        .value-disp { color: #38bdf8; font-weight: bold; }
        #canvas-container { position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        canvas { display: block; border-radius: 4px; }
        .control-point {
            position: absolute; width: 16px; height: 16px; background: #38bdf8;
            border: 2px solid #fff; border-radius: 50%; cursor: move;
            transform: translate(-8px, -8px); box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
            z-index: 10;
        }
        .section-title { border-bottom: 1px solid #334155; margin: 20px 0 15px 0; padding-bottom: 8px; color: #38bdf8; font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎬 Media Facade Pre-viz Auto-Mapper</h1>
    <p style="color: #64748b; margin: 0;">실제 현장 촬영본(Mock-up) 퀄리티의 프로젝션 매핑 실시간 자동 합성 툴</p>

    <div class="container">
        <div class="control-panel">
            <div class="section-title" style="margin-top:0;">1. 에셋 로드 (현장 & 콘텐츠)</div>
            <label>🖼️ 현장 배경 사진 (Wall/Space)</label>
            <input type="file" id="bg-input" accept="image/*">

            <label>🎞️ 상영할 미디어 아트 (Video)</label>
            <input type="file" id="video-input" accept="video/*">

            <div class="section-title">2. 리얼리티 합성 보정 (Photorealism)</div>
            
            <label>✨ 빛 블렌딩 모드 (프로젝터 효과)</label>
            <select id="blend-mode">
                <option value="screen">Screen (스크린 - 실제 빔프로젝터 느낌)</option>
                <option value="lighter">Lighter (라이터 - 강한 발광체/LED 느낌)</option>
                <option value="source-over">Normal (노멀 - 단순 덮어쓰기)</option>
            </select>

            <label>🌟 주변부 환경광(Glow Spill): <span id="glow-val" class="value-disp">30</span>px</label>
            <input type="range" id="glow-input" min="0" max="150" value="30">

            <label>🌫️ 영상 투명도 (Opacity): <span id="opacity-val" class="value-disp">90</span>%</label>
            <input type="range" id="opacity-input" min="10" max="100" value="90">

            <label>✂️ 경계선 페더 (Edge Softness): <span id="feather-val" class="value-disp">10</span>px</label>
            <input type="range" id="feather-input" min="0" max="100" value="10">
        </div>

        <div class="view-panel">
            <div id="canvas-container">
                <canvas id="main-canvas" width="960" height="540"></canvas>
                <div class="control-point" id="cp0" style="left: 150px; top: 100px;"></div>
                <div class="control-point" id="cp1" style="left: 810px; top: 100px;"></div>
                <div class="control-point" id="cp2" style="left: 150px; top: 440px;"></div>
                <div class="control-point" id="cp3" style="left: 810px; top: 440px;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        
        // UI 요소를 변수에 바인딩
        const bgInput = document.getElementById('bg-input');
        const videoInput = document.getElementById('video-input');
        const blendModeSelect = document.getElementById('blend-mode');
        const glowInput = document.getElementById('glow-input');
        const glowVal = document.getElementById('glow-val');
        const opacityInput = document.getElementById('opacity-input');
        const opacityVal = document.getElementById('opacity-val');
        const featherInput = document.getElementById('feather-input');
        const featherVal = document.getElementById('feather-val');
        
        const cps = [document.getElementById('cp0'), document.getElementById('cp1'), document.getElementById('cp2'), document.getElementById('cp3')];
        
        let bgImage = null;
        let videoElement = null;
        let isVideoLoaded = false;

        let corners = [{x: 150, y: 100}, {x: 810, y: 100}, {x: 150, y: 440}, {x: 810, y: 440}];
        let activePoint = null;

        // 드래그 로직
        cps.forEach((cp, index) => {
            cp.addEventListener('mousedown', () => { activePoint = index; });
        });
        window.addEventListener('mouseup', () => { activePoint = null; });
        window.addEventListener('mousemove', (e) => {
            if (activePoint !== null) {
                const rect = canvas.getBoundingClientRect();
                let x = Math.max(0, Math.min(canvas.width, e.clientX - rect.left));
                let y = Math.max(0, Math.min(canvas.height, e.clientY - rect.top));
                
                corners[activePoint] = {x, y};
                cps[activePoint].style.left = x + 'px';
                cps[activePoint].style.top = y + 'px';
                if(!isVideoLoaded) renderLoop();
            }
        });

        // 배경 및 영상 로드
        bgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            bgImage = new Image();
            bgImage.src = URL.createObjectURL(file);
            bgImage.onload = () => { renderLoop(); };
        });

        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if(videoElement) { videoElement.pause(); videoElement.remove(); }
            
            videoElement = document.createElement('video');
            videoElement.src = URL.createObjectURL(file);
            videoElement.loop = true; videoElement.muted = true;
            videoElement.play();
            
            videoElement.addEventListener('play', () => {
                isVideoLoaded = true;
                function playStep() { if (isVideoLoaded) { renderLoop(); requestAnimationFrame(playStep); } }
                requestAnimationFrame(playStep);
            });
        });

        // 슬라이더 UI 업데이트
        [glowInput, opacityInput, featherInput, blendModeSelect].forEach(el => {
            el.addEventListener('input', () => {
                glowVal.innerText = glowInput.value;
                opacityVal.innerText = opacityInput.value;
                featherVal.innerText = featherInput.value;
                if(!isVideoLoaded) renderLoop();
            });
        });

        // ✨ 메인 렌더링 루프 (리얼리티 합성 알고리즘)
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 베이스 레이어: 현장 배경 사진 렌더링 (Normal 모드)
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.filter = 'none';
            if (bgImage) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (videoElement && isVideoLoaded) {
                // 바운딩 박스 계산
                let minX = Math.min(corners[0].x, corners[2].x);
                let minY = Math.min(corners[0].y, corners[1].y);
                let w = Math.max(corners[1].x, corners[3].x) - minX;
                let h = Math.max(corners[2].y, corners[3].y) - minY;

                // 2. 환경광 레이어: 주변 바닥/천장에 빛 번짐(Glow Spill) 생성
                let glow = parseInt(glowInput.value);
                if (glow > 0) {
                    ctx.save();
                    ctx.globalCompositeOperation = blendModeSelect.value; // 주변에도 빛처럼 합성
                    ctx.globalAlpha = (parseInt(opacityInput.value) / 100) * 0.5; // 원래 투명도의 절반
                    ctx.filter = `blur(${glow}px)`; // 강한 블러로 환경광 효과
                    
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y); ctx.lineTo(corners[1].x, corners[1].y);
                    ctx.lineTo(corners[3].x, corners[3].y); ctx.lineTo(corners[2].x, corners[2].y);
                    ctx.closePath();
                    ctx.clip();
                    
                    ctx.drawImage(videoElement, minX - glow, minY - glow, w + glow*2, h + glow*2);
                    ctx.restore();
                }

                // 3. 메인 콘텐츠 레이어: 실제 영상 매핑 및 렌더링
                ctx.save();
                ctx.globalCompositeOperation = blendModeSelect.value; // Screen 등 빛 합성 모드 적용
                ctx.globalAlpha = parseInt(opacityInput.value) / 100;
                ctx.filter = 'none';

                ctx.beginPath();
                ctx.moveTo(corners[0].x, corners[0].y); ctx.lineTo(corners[1].x, corners[1].y);
                ctx.lineTo(corners[3].x, corners[3].y); ctx.lineTo(corners[2].x, corners[2].y);
                ctx.closePath();
                ctx.clip(); // 매핑 영역 마스크

                ctx.drawImage(videoElement, minX, minY, w, h);
                ctx.restore();

                // 4. 마스크 후보정: 외곽선 페더링 깎아내기 (자연스러운 경계선)
                let feather = parseInt(featherInput.value);
                if (feather > 0) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'destination-out'; // 지우개 모드
                    
                    let gradLeft = ctx.createLinearGradient(minX, 0, minX + feather, 0);
                    gradLeft.addColorStop(0, 'rgba(0,0,0,1)'); gradLeft.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gradLeft; ctx.fillRect(minX, minY, feather, h);

                    let gradRight = ctx.createLinearGradient(minX + w - feather, 0, minX + w, 0);
                    gradRight.addColorStop(0, 'rgba(0,0,0,0)'); gradRight.addColorStop(1, 'rgba(0,0,0,1)');
                    ctx.fillStyle = gradRight; ctx.fillRect(minX + w - feather, minY, feather, h);
                    ctx.restore();
                }
            }
        }
        renderLoop();
    </script>
</body>
</html>
