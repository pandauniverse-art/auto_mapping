<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Facade Mapper</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
</head>
<body>
  <main class="app">
    <header>
      <h1>Spatial Facade Mapper</h1>
      <p>배경 이미지를 넣고, 스캔 영역을 드래그한 뒤 파사드 콘텐츠를 공간에 맞춰 확인합니다.</p>
    </header>

    <section id="dropZone" class="drop">
      <strong>파일 또는 폴더를 화면에 드래그하세요</strong>
      <span>첫 이미지는 배경으로, 이후 이미지/영상은 파사드 콘텐츠로 자동 적용됩니다.</span>
      <div>
        <label>파일 선택 <input id="fileInput" type="file" multiple accept="image/*,video/*"></label>
        <label>폴더 선택 <input id="folderInput" type="file" webkitdirectory directory multiple></label>
      </div>
    </section>

    <div class="main-layout">
      
      <div id="stageScroll" class="stage-scroll">
        <div id="stage" class="stage">
          <div id="webgl-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>

          <img id="bgImg" alt="배경 이미지">
          <div id="mapped" class="mapped empty">
            <img id="mapImg" alt="파사드 이미지">
            <video id="mapVideo" muted loop playsinline></video>
          </div>

          <svg id="overlay" class="overlay">
            <defs><clipPath id="maskClip"><path id="clipPathData" d=""></path></clipPath></defs>
            <path id="poly" d=""></path>
            <rect id="scanRect"></rect>
          </svg>
        </div>
      </div>

      <div id="resizer" class="resizer"></div>

      <aside class="side-panel" id="sidePanel">
        <section class="controls">
          <label>배경 이미지 <select id="bgSelect"><option value="">배경 선택</option></select></label>
          <label>파사드 콘텐츠 <select id="contentSelect"><option value="">콘텐츠 선택</option></select></label>
          
          <div class="step-group">
            <span class="step-label">● 매핑 채널 레이어 선택</span>
            <div style="display: flex; gap: 6px; margin-top: 6px;">
              <button type="button" class="layer-btn active" onclick="switchLayer(0)" style="flex:1; padding:6px; background:#3b82f6; color:#fff; border:none; border-radius:4px; cursor:pointer;">Wall A</button>
              <button type="button" class="layer-btn" onclick="switchLayer(1)" style="flex:1; padding:6px; background:#1e293b; color:#fff; border:none; border-radius:4px; cursor:pointer;">Wall B</button>
              <button type="button" class="layer-btn" onclick="switchLayer(2)" style="flex:1; padding:6px; background:#1e293b; color:#fff; border:none; border-radius:4px; cursor:pointer;">Wall C</button>
              <button type="button" class="layer-btn" onclick="switchLayer(3)" style="flex:1; padding:6px; background:#1e293b; color:#fff; border:none; border-radius:4px; cursor:pointer;">Wall D</button>
            </div>
          </div>
          
          <div class="step-group">
            <span class="step-label">① 영역 지정</span>
            <button id="scanAreaButton" disabled>영역 드래그</button>
            <button id="clearScanAreasButton" disabled>영역 지우기</button>
          </div>
          <div class="step-group">
            <span class="step-label">② AI 스캔</span>
            <button id="scanButton" disabled>스캔 실행</button>
            <button id="nextCandidateButton" disabled>다음 후보 →</button>
          </div>

          <div class="step-group">
            <span class="step-label">③ 핀 조정</span>
            <div style="display: flex; gap: 14px; width: 100%; margin: 4px 0 8px 4px; font-size: 13px; color: #cbd5e1;">
              <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="editMode" id="modeWarp" value="warp" checked style="cursor: pointer;"> 파사드 워프
              </label>
              <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="editMode" id="modeMask" value="mask" style="cursor: pointer;"> 영역 마스크
              </label>
            </div>
            <button id="addPointButton" disabled>핀 추가</button>
            <button id="deletePointButton" disabled>핀 삭제</button>
            <button id="resetButton" disabled>초기화</button>
          </div>

          <div class="step-group">
            <span class="step-label">④ 톤 보정</span>
            <label>투명도 <input id="opacitySlider" type="range" min="0" max="100" value="100"></label>
            <label>밝기 <input id="brightnessSlider" type="range" min="0" max="200" value="100"></label>
            <label>합성 모드 
              <select id="blendModeSelect">
                <option value="normal">Normal</option>
                <option value="screen">Screen</option>
                <option value="multiply">Multiply</option>
                <option value="overlay">Overlay</option>
              </select>
            </label>
          </div>
          <label class="check"><input id="guideToggle" type="checkbox" checked> 가이드 표시</label>
          <label>배경 크기 <input id="zoomSlider" type="range" min="0" max="200" value="100"></label>
        </section>

        <div class="status-panel">
          <h2>파일 목록</h2>
          <div id="fileList" class="file-list"></div>
          <h2>상태</h2>
          <p><span>배경</span><b id="bgInfo">없음</b></p>
          <p><span>콘텐츠</span><b id="contentInfo">없음</b></p>
          <p><span>모드</span><b id="modeInfo">대기</b></p>
        </div>
      </aside>
    </div> 
  </main>

  <script>
    const resizer = document.getElementById('resizer');
    const sidePanel = document.getElementById('sidePanel');

    resizer.addEventListener('mousedown', () => {
      document.addEventListener('mousemove', resize);
      document.addEventListener('mouseup', stopResize);
    });

    function resize(e) {
      const newWidth = document.body.clientWidth - e.clientX;
      if (newWidth > 320 && newWidth < 520) {
        sidePanel.style.width = `${newWidth}px`;
      }
    }

    function stopResize() {
      document.removeEventListener('mousemove', resize);
      document.removeEventListener('mouseup', stopResize);
    }
  </script>

  <canvas id="scanCanvas" style="display: none;"></canvas> 
  <script src="./app.js"></script>
</body>
</html>
