<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Scanner MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Spatial Scanner MVP</h1>
        <p>이미지를 업로드하면 벽면/건물 후보가 될 수 있는 공간 라인을 스캔합니다.</p>
      </div>
    </header>

    <section class="controls">
      <label class="file-button">
        배경 이미지 업로드
        <input id="imageInput" type="file" accept="image/*" />
      </label>

      <button id="scanButton" disabled>공간 스캔</button>
      <button id="clearButton" disabled>결과 지우기</button>
    </section>

    <section class="workspace">
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <aside class="panel">
        <h2>스캔 정보</h2>
        <div class="stat">
          <span>이미지</span>
          <strong id="imageInfo">없음</strong>
        </div>
        <div class="stat">
          <span>검출 라인</span>
          <strong id="lineCount">0</strong>
        </div>
        <div class="stat">
          <span>수평 후보</span>
          <strong id="horizontalCount">0</strong>
        </div>
        <div class="stat">
          <span>수직 후보</span>
          <strong id="verticalCount">0</strong>
        </div>

        <p class="note">
          이 단계는 AI가 아니라 브라우저 기반 엣지/라인 검출 테스트입니다.
          벽면, 창문, 건물 외곽처럼 강한 직선 구조가 있는 이미지에서 잘 보입니다.
        </p>
      </aside>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
