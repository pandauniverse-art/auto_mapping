<section class="controls">
  <label>
    배경 이미지
    <select id="bgSelect">
      <option value="">배경을 선택하세요</option>
    </select>
  </label>

  <label>
    파사드 콘텐츠
    <select id="contentSelect">
      <option value="">콘텐츠를 선택하세요</option>
    </select>
  </label>

  <button id="scanButton" disabled>공간 스캔</button>
  <button id="addPointButton" disabled>포인트 추가 모드</button>
  <button id="deletePointButton" disabled>포인트 삭제 모드</button>
  <button id="resetQuadButton" disabled>포인트 초기화</button>

  <label>
    배경 크기
    <input id="zoomSlider" type="range" min="30" max="160" value="100" />
  </label>
</section>

<section class="workspace">
  <div id="stageScroll" class="stage-scroll">
    <div id="stage" class="stage">
      <img id="backgroundImage" alt="배경 이미지" />

      <div id="mappedLayer" class="mapped-layer is-empty">
        <img id="mappedImage" alt="매핑 이미지" />
        <video id="mappedVideo" muted loop playsinline></video>
      </div>

      <svg id="overlaySvg" class="overlay-svg">
        <polygon id="surfacePolygon"></polygon>
      </svg>
    </div>
  </div>
