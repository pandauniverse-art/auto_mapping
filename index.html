<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Facade Mapper</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Spatial Facade Mapper</h1>
      <p>배경 이미지 위에 포인트를 찍고, 파사드 콘텐츠를 공간에 맞춰 왜곡합니다.</p>
    </header>

    <section id="dropZone" class="drop">
      <b>이미지/영상 파일 또는 폴더 드래그</b>
      <div>
        <label>파일 선택 <input id="fileInput" type="file" multiple accept="image/*,video/*"></label>
        <label>폴더 선택 <input id="folderInput" type="file" webkitdirectory directory multiple></label>
      </div>
    </section>

    <section class="controls">
      <label>배경 <select id="bgSelect"><option value="">선택</option></select></label>
      <label>콘텐츠 <select id="contentSelect"><option value="">선택</option></select></label>
      <button id="scanButton" disabled>공간 스캔</button>
      <button id="addPointButton" disabled>포인트 추가</button>
      <button id="deletePointButton" disabled>포인트 삭제</button>
      <button id="resetButton" disabled>초기화</button>
      <label>배경 크기 <input id="zoomSlider" type="range" min="40" max="160" value="100"></label>
    </section>

    <section class="layout">
      <div id="stageScroll" class="stage-scroll">
        <div id="stage" class="stage">
          <img id="bgImg" alt="">
          <div id="mapped" class="mapped empty">
            <img id="mapImg" alt="">
            <video id="mapVideo" muted loop playsinline></video>
          </div>
          <svg id="svg" class="svg"><polygon id="poly"></polygon></svg>
        </div>
      </div>

      <aside>
        <h2>파일 목록</h2>
        <div id="fileList" class="file-list"></div>
        <h2>상태</h2>
        <p>배경: <b id="bgInfo">없음</b></p>
        <p>콘텐츠: <b id="contentInfo">없음</b></p>
        <p>모드: <b id="modeInfo">대기</b></p>
      </aside>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
